<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI Creator Lab</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h1>AI Creator Lab</h1>

<nav>

<button data-tab="game">AIゲーム生成</button>
<button data-tab="site">AIサイト生成</button>
<button data-tab="video">AI動画生成</button>

</nav>

</header>

<main>

<section id="game" class="tab">

<h2>AIゲーム生成</h2>

<textarea id="gamePrompt"
placeholder="例：宇宙で敵を倒すシューティングゲーム"></textarea>

<button id="generateGame">生成</button>

<iframe id="gameFrame"></iframe>

</section>

<section id="site" class="tab">

<h2>AIサイト生成</h2>

<textarea id="sitePrompt"
placeholder="例：青いデザインのポートフォリオサイト"></textarea>

<button id="generateSite">生成</button>

<iframe id="siteFrame"></iframe>

</section>

<section id="video" class="tab">

<h2>AI動画生成</h2>

<input type="file" id="imageInput">

<textarea id="videoPrompt"
placeholder="例：宇宙を飛ぶ"></textarea>

<button id="generateVideo">生成</button>

<canvas id="videoCanvas"></canvas>

<button id="downloadVideo">動画ダウンロード</button>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
